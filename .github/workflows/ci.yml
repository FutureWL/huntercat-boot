name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (@pjd/web)
        run: pnpm --filter @pjd/web lint

      - name: Typecheck (@pjd/web)
        run: pnpm --filter @pjd/web typecheck

      - name: Build (@pjd/web)
        run: pnpm --filter @pjd/web build
